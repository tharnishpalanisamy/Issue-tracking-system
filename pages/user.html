    <!-- profile canvas  -->
     <div class="offcanvas offcanvas-end bg" tabindex="-1" id="profileCanvas" aria-labelledby="offcanvasRightLabel"
     >
        <div class="offcanvas-header">
            <h5 class="offcanvas-title text-light" id="offcanvasRightLabel"><i class="bi bi-list fs-4"></i> Menu</h5>
            <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body">
            <div class="text-center mb-4">
          <i class="bi bi-person-circle display-2 text-light "></i>

          <h4 class="mt-3 profile blue"></h4>

    <!-- raise ticket modal -->

    <div class="modal fade" id="riseTicketModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="riseTicketModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="riseTicketModalLabel">Raise Ticket <i class="bi bi-ticket-fill"></i></h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mt-3">
                        <label for="title" class="form-label">Issue Title <span class="required">*</span></label>
                        <input type="text" class="form-control" id="title"> 
                    </div>
                    <div class="mt-3">
                        <label for="details" class="form-label">Issue Details <span class="required">*</span></label> 
                        <input type="text" class="form-control" id="details">
                    </div>
                    <div class="mt-3">
                        <label for="description" class="form-label">Issue description <span class="required">*</span></label> 
                        <textarea name="description" id="description" cols="30" rows="2" class="form-control"></textarea>
                    </div>
                    <div class="mt-3">
                        <label for="priority" class="form-label">Priority <span class="required">*</span></label>
                        <select name="priority" id="priority" class="form-select">
                            <option value=""></option>
                            <option value="low">Low </option>
                            <option value="medium">Medium</option>
                            <option value="High">Hight</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="raiseTicket">Raise Ticket</button>
                </div> 

            </div>
        </div>
    </div>

    <!-- profile modal  --> 
     <div class="modal fade" id="userProfileModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-labelledby="userProfileModalLabel" aria-hidden="true">

            <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="userProfileModalLabel">Profile</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="displayProfile"></div>
            </div>
