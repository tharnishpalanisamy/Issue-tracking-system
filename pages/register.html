<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title> 
    <link rel="stylesheet" href="../styles/styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body>
    <!--navbar-->

    <nav class="navbar bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand text-light" >Issue Tracking</a> 
        </div>
        
</nav>




    <div class="container bg-body-tertiary w-50 mt-5" >
        <h3 class="text-center text-primary">Register User</h3>
        <div class="row">
            <div class="col-lg-6 col-12">
                 <form action="" id="register" class="px-lg-3">
        <div class="mt-3">
            <label for="name" class="form-label">Name <span class="required">*</span>
                 <span class="required" id="nameErr"></span> </label> 
            <input type="text" class="form-control" placeholder="Eg : Arjun" id="name">
        </div> 

        <div class="mt-3">
            <label for="email" class="form-label">Email <span class="required">*</span> 
                <span class="required" id="emailErr"></span></label>
            <input type="text" class="form-control" placeholder="abc@gmail.com" id="email">
        </div>
        <div class="mt-3">
            <label for="password" class="form-label">Password <span class="required">*</span>
            <span class="required" id="passwordErr"></span></label> 
            <input type="text" id="password" class="form-control" placeholder="********"> 
        </div>
        <div class="mt-3">
            <label for="department" class="form-label">Department <span class="required">*</span></label>
            <select name="department" id="department" class="form-select">
                <option value="">Select Your Department</option>
                <option value="IT">IT</option>
                <option value="Marketing">Marketing</option>
                <option value="Research">Research</option>
                <option value="Admin">Admin</option>
            </select>
        </div>
        
        <div class="mt-3">
            <label for="designation" class="form-label">Designation <span class="required">*</span></label> 
            <input type="text" class="form-control" placeholder="Eg : Software Tester" id="designation">
        </div>    

        <div class="mt-3 mb-3">
            <button type="button" class="btn btn-outline-primary" id="createAccount">Create Account</button>
        </div>

    </form>
            </div>
            <div class="col-6 d-none d-lg-flex">
                <img src="../assets/register.svg" alt="" class="img-fluid">
            </div>
        </div>
    </div>

    <script src="../js/register.js"></script>
</body>
</html>
