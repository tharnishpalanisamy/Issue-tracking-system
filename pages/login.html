<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/login.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <!--Nav bar--> 
    <nav class="navbar" style="background-color: #10B981 !important;"> 
        <div class="container-fluid"> 
            <a class="navbar-brand text-light" >Issue Tracking</a> 
            <div class="theme me-5">
                <i class="bi bi-moon-fill fs-4"></i>
                <i class="bi bi-sun-fill fs-4 d-none"></i>
            </div>
        </div>
        
    </nav>

    <div class="container bg-body-tertiary w-50 mt-5">
        <div class="row">
            <h3 class="text-center text-success">Login</h3>
            <div class="col-12 col-lg-6">
                <form action="" id="login"> 
                    <div class="mt-3 text-center">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="role" id="user" value="user" checked>
                            <label class="form-check-label" for="user" >User</label>
                        </div>

                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="role" id="admin" value="admin">
                            <label class="form-check-label" for="admin">Admin</label>
                        </div>
                    </div>

                    <div class="mt-3">
                        <label for="email" class="form-label">Email <span class="required">*</span></label>
                        <input type="text" class="form-control" id="email" placeholder="abc@gmail.com">
                    </div>
                    <div class="mt-3">
                        <label for="password" class="form-label">Password <span class="required">*</span></label> 
                        <input type="text" class="form-control" id="password" placeholder="********">
                    </div> 
                    <div class="mt-4">
                        <button type="button" class="btn btn-outline-success w-100 " id="loginBtn">Login </button> 
                        
                    </div>

                    <div class="mt-3">
                        <p class="text-success">Dont have a Account ? <a href="register.html" class="text-decoration-none"><span class="text-primary">Register</span></a></p>
                    </div>
                </form> 
            </div> 

            <div class="col-6 d-none d-lg-flex">
                <img src="../assets/Login.svg" alt="" class="img-fluid">
            </div>
        </div>
    </div>
    <script src="../js/login.js"></script>
</body>
</html>
