<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="../styles/adminusers.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="shortcut icon" href="../assets/favicon.svg" type="image/x-icon">
</head>
<body>
<nav class="navbar navbar-expand-lg bg px-3">
    <div class="container-fluid">

        <a class="navbar-brand fs-3 fw-bold blue">
            Admin Panel
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#adminNavbar"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="adminNavbar">
            <div class="navbar-nav mx-auto gap-lg-4 text-center">
                <a href="admindashboard.html" class="nav-link text-light     fw-medium">Dashboard</a>
                <a href="#" class="nav-link active fw-medium">Users</a>
                <a href="adminissues.html" class="nav-link fw-medium text-light">Issues</a>
            </div>
            <div class="mt-3 mt-lg-0 d-flex align-items-center justify-content-center">
                <button class="btn btn-danger" id="logoutBtn">
                    <span class="logout-text">
                        <i class="fa-solid fa-right-to-bracket text-light"></i>
                        Logout
                    </span>

                    <span
                        class="spinner-border spinner-border-sm d-none logout-spinner"
                    ></span>
                </button>
            </div>
        </div>
    </div>
</nav>



    <div class="container mt-5">
        <div class="d-flex justify-content-between"> 
            <h3 class="btn btn-outline-primary rounded-pill fs-4 px-5">User List</h3>
            <div class="filter d-flex justify-content-around gap-3 align-items-center">
                <select name="priority" id="department" class="form-select">
                    <option value="All">All Department</option>
                    <option value="IT">IT</option>
                    <option value="Marketing">Marketing</option>
                    <option value="Research">Research</option>
                    <option value="Admin">Admin</option>
                </select> 
                <input type="text" class="form-control" placeholder="Search by Name" id="searchName"> 
                <i class="bi bi-search fs-3" id="searchBtn"></i>
            </div>
        </div>
    </div>

    <div class="container mt-5 ">
        <div class="table-responsive">
            <table class="table table-bordered table-hover table-striped">
            <thead class="table-primary">
                <th scope="col">User No</th>
                <th scope="col">Name</th>
                <th scope="col">Email </th>
                <th scope="col">Department</th>
                <th scope="col">Designation</th>
                <th scope="col">Date Of joining</th>
            </thead>
            <tbody></tbody>
        </table>
        </div>
    </div>
    <!--toast--> 
      <div class="toast-container position-fixed bottom-0 end-0 p-4">

    <div id="loginToast" class="toast border-0 shadow">
        <div class="d-flex">
            <div class="toast-body fs-5 py-3">
                Match Found Successfully 🎉
            </div>
            <button type="button"
                    class="btn-close me-2 m-auto"
                    data-bs-dismiss="toast">
            </button>
        </div>
    </div>

</div>
    <script src="../js/adminusers.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
