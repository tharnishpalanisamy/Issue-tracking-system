<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raise Issues</title>
    <link rel="stylesheet" href="../styles/usertickets.css">
    <link rel="shortcut icon" href="../assets/favicon.svg" type="image/x-icon">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white shadow-sm sticky-top">
    <div class="container p-2">

        <a class="navbar-brand fw-bold text-primary fs-4" href="#">
            IssueTrack
        </a>


    </div>
</nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between"> 
            <div class="btn-container">
                <a href="user.html" class="fs-4 btn btn-outline-danger border-2 rounded-pill   "><i class="bi bi-arrow-left"></i></a>
                <h5 class="fs-4 btn btn-outline-primary rounded-pill px-5  ">Issues List</h5>
            
            </div>
            <div class="filter d-flex justify-content-around gap-3 align-items-center ">
                <select name="priority" id="priority" class="form-select">
                    <option value="All">All Priority</option>
                    <option value="High">High priority</option>
                    <option value="Medium">Medium Priority</option>
                    <option value="Low">Low priority</option>
                </select>

                <select name="status" id="status" class="form-select">
                    <option value="All">All Issues</option>
                    <option value="Open">Open Tickets</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Closed">Closed</option>
                </select>

                <input type="text" class="form-control" id="searchIssue" placeholder="Search by Issue"> 
                <i class="bi bi-search fs-3"></i>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <div class="table-responsive">
            <table class="table table-bordered table-hover  table-striped">
            <thead class="table-primary">
                <th scope="col">Issue No</th>
                <th scope="col" >Issue Title</th>
                <th scope="col" >Issue details </th>
                <th scope="col">Issue description</th>
                <th scope="col" >Issue Priority</th>
                <th scope="col" >Raised By</th>
                <th scope="col">Created On</th> 
                
                <th scope="col">Issue status</th> 
                <th scope="col">Remarks</th>

            </thead>
            <tbody></tbody>
        </table>
        </div>
    </div>
    <script src="../js/usertickets.js"></script>
</body>
</html>
