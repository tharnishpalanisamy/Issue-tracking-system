<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/usertickets.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <nav class="navbar w-100" style="background-color: #10B981 !important;"> 
        <div class="container-fluid"> 
            <a class="navbar-brand text-light fw-bold" >IssueTrack</a> 
            <div class="theme me-5">
                <i class="bi bi-moon-fill fs-4"></i>
                <i class="bi bi-sun-fill fs-4 d-none"></i>
            </div>
        </div> 
    </nav>


    <div class="container mt-5">
        <div class="d-flex justify-content-between"> 
            <h5>Issues List</h5>
            <div class="filter d-flex justify-content-around gap-3 ">
                <select name="priority" id="priority" class="form-select">
                    <option value="All">All Priority</option>
                    <option value="high">High priority</option>
                    <option value="medium">Medium Priority</option>
                    <option value="low">Low priority</option>
                </select>

                <select name="status" id="status" class="form-select">
                    <option value="All">All Issues</option>
                    <option value="open">Open Tickets</option>
                    <option value="progress">In Progress</option>
                    <option value="closed">Closed</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <table class="table">
            <thead>
                <th scope="col">Issue No</th>
                <th scope="col">Issue Title</th>
                <th scope="col">Issue details </th>
                <th scope="col">Issue description</th>
                <th scope="col">Issue Priority</th>
                <th scope="col">Raised By</th>
                <th scope="col">Created On</th> 
                
                <th scope="col">Issue status</th> 

            </thead>
            <tbody></tbody>
        </table>
    </div>
    <script src="../js/usertickets.js"></script>
</body>
</html>
