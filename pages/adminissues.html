<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../styles/adminissues.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>
<body>
    <nav class="navbar bg"> 
        <div class="container-fluid"> 
            <a class="navbar-brand fs-3 fw-bold blue" >Admin Panel</a> 

            <div class="div d-flex justify-content-center gap-5 ">
                <a href="admindashboard.html" class=" fw-medium">Dashboard</a>
                <a href="adminusers.html" class="fw-medium">Users</a>
                <a href="#" class="fw-medium active">Issues</a>
                <!-- <a href="">Statistics</a> -->
            </div>


            <div class="theme me-5">
                <button class="btn"><i class="bi bi-sun-fill fs-4 d-none"></i></button>
                <button class="btn"><i class="bi bi-moon-fill fs-4 text-light"></i></button>
                <button class="btn btn-danger">Logout</button>
            </div>
            
        </div> 
    </nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between"> 
            <h5>Issues List</h5>
            <div class="filter d-flex justify-content-around gap-3 ">
                <select name="priority" id="priority" class="form-select">
                    <option value="All">All Priority</option>
                    <option value="High">High priority</option>
                    <option value="Medium">Medium Priority</option>
                    <option value="Low">Low priority</option>
                </select>

                <select name="status" id="status" class="form-select">
                    <option value="All">All Issues</option>
                    <option value="Open">Open Tickets</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Closed">Closed</option>
                </select>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <table class="table table-bordered table-hover">
            <thead class="bg-blue table-primary" >
                <th scope="col">Issue No</th>
                <th scope="col">Issue Title</th>
                <th scope="col">Issue details </th>
                <th scope="col">Issue description</th>
                <th scope="col">Issue Priority</th>
                <th scope="col">Raised By</th>
                <th scope="col">Created On</th> 
                <th scope="col">Issue status</th> 
                <th scope="col">Remarks</th>
                <th scope="col"></th>

            </thead>
            <tbody></tbody>
        </table>
    </div>
    

    <!--update issue modal--> 
    <div class="modal fade" id="editIssueModal" tabindex="-1" aria-labelledby="editIssueModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="editIssueModalLabel">Modal title</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mt-3">
                    <label for="status" class="form-label">Issue Status <span class="required">*</span></label> 
                    <select name="status" id="Status" class="form-select">
                        <option value="Open">Open</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>

                <div class="mt-3">
                    <label for="remarks" class="form-label">Remarks <span class="required">*</span></label> 
                    <textarea name="remarks" id="remarks" cols="2" class="form-control"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary saveBtn">Save changes</button>
            </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/adminissues.js"></script>
</body>
</html>
