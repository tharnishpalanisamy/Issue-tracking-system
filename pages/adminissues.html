<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <link rel="stylesheet" href="../styles/adminissues.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="shortcut icon" href="../assets/favicon.svg" type="image/x-icon">
</head>
<body>


<nav class="navbar navbar-expand-lg bg px-3">
    <div class="container-fluid">

        <a class="navbar-brand fs-3 fw-bold blue">
            Admin Panel
        </a>

        <button
            class="navbar-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#adminNavbar"
        >
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="adminNavbar">
            <div class="navbar-nav mx-auto gap-lg-4 text-center">
                <a href="admindashboard.html" class="nav-link text-light  fw-medium">Dashboard</a>
                <a href="adminusers.html" class="nav-link text-light fw-medium">Users</a>
                <a href="#" class="nav-link fw-medium active">Issues</a>
            </div>
            <div class="mt-3 mt-lg-0 d-flex align-items-center justify-content-center">
                <button class="btn btn-danger" id="logoutBtn">
                    <span class="logout-text">
                        <i class="fa-solid fa-right-to-bracket text-light"></i>
                        Logout
                    </span>

                    <span
                        class="spinner-border spinner-border-sm d-none logout-spinner"
                    ></span>
                </button>
            </div>
        </div>
    </div>
</nav>

    <div class="container mt-5">
        <div class="d-flex justify-content-between"> 
            <h3 class="btn btn-outline-primary rounded-pill fs-4 px-5">Issues List <img src="" alt=""></h3>
            <div class="filter d-flex justify-content-around gap-3 align-items-center ">
                <i class="bi bi-funnel-fill fs-2" id="filterBtn" data-bs-toggle="modal" data-bs-target="#filterModal"></i>
                <select name="priority" id="priority" class="form-select">
                    <option value="All">All Priority</option>
                    <option value="High">High priority</option>
                    <option value="Medium">Medium Priority</option>
                    <option value="Low">Low priority</option>
                </select>

                <select name="status" id="status" class="form-select">
                    <option value="All">All Issues</option>
                    <option value="Open">Open Tickets</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Closed">Closed</option>
                </select>
                <input type="text" class="form-control" id="searchIssue" placeholder="Search by Title"> 
                <i class="bi bi-search fs-3"></i>
            </div>
        </div>
    </div>

    <div class="container mt-5">
        <div class="table-responsive">
            <table class="table table-bordered table-hover table-striped">
            <thead class="bg-blue table-primary" >
                <th scope="col">Issue No</th>
                <th scope="col">Issue Title</th>
                <th scope="col">Issue details </th>
                <th scope="col">Issue description</th>
                <th scope="col">Issue Priority</th>
                <th scope="col">Raised By</th>
                <th scope="col">Created On</th> 
                <th scope="col">Issue status</th> 
                <th scope="col">Remarks</th>
                <th scope="col"></th>

            </thead>
            <tbody></tbody>
        </table>
        </div>
    </div>
    

    <!--update issue modal--> 
    <div class="modal fade" id="editIssueModal" tabindex="-1" aria-labelledby="editIssueModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="editIssueModalLabel">Modal title</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mt-3">
                    <label for="status" class="form-label">Issue Status <span class="required">*</span></label> 
                    <select name="status" id="Status" class="form-select">
                        <option value="Open">Open</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Closed">Closed</option>
                    </select>
                </div>

                <div class="mt-3">
                    <label for="remarks" class="form-label">Remarks <span class="required">*</span></label> 
                    <textarea name="remarks" id="remarks" cols="2" class="form-control"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                <button type="button" class="btn btn-primary saveBtn" id="saveBtn">Save changes</button>
            </div>
            </div>
        </div>
    </div>

        <!--Toast-->
        <div class="toast-container position-fixed bottom-0 end-0 p-4">
            <div id="loginToast" class="toast border-0 shadow">
                <div class="d-flex">
                    <div class="toast-body fs-5 py-3">
                        Login Successful 🎉
                    </div>
                    <button type="button"
                            class="btn-close me-2 m-auto"
                            data-bs-dismiss="toast">
                    </button>
                </div>
            </div>

        </div>


        <!--Filter by date modal--> 
        <div class="modal fade" id="filterModal" tabindex="-1" aria-labelledby="filterModalLabel" aria-hidden="true">
            <div class="modal-dialog">
                <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="filterModalLabel">Modal title</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mt-3">
                        <label for="fromdate" class="form-label">From <span class="required">*</span></label>
                        <input type="date" class="form-control" id="fromDate" required>
                    </div>
                    <div class="mt-3">
                        <label for="fromdate" class="form-label">From <span class="required">*</span></label>
                        <input type="date" class="form-control" id="toDate">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" id="applyBtn">Apply changes</button>
                </div>
                </div>
            </div>
        </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/adminissues.js"></script>
</body>
</html>
